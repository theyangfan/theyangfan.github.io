  <h1 class="article-title"><span>添加批注</span></h1>
  <h2 id="1-给段落添加批注"><a href="#1-给段落添加批注" class="headerlink" title="1. 给段落添加批注"></a>1. 给段落添加批注</h2><p>某个带有批注的段落的xml结构如下：</p>
<span id="more"></span>



<figure class="highlight xml"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br></pre></td><td class="code"><pre><span class="line"><span class="tag">&lt;<span class="name">w:p</span> <span class="attr">xmlns:w</span>=<span class="string">&quot;http://schemas.openxmlformats.org/wordprocessingml/2006/main&quot;</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">w:commentRangeStart</span> <span class="attr">w:id</span>=<span class="string">&quot;0&quot;</span> /&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">w:r</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">w:t</span>&gt;</span>番茄就是西红柿<span class="tag">&lt;/<span class="name">w:t</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;/<span class="name">w:r</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">w:commentRangeEnd</span> <span class="attr">w:id</span>=<span class="string">&quot;0&quot;</span> /&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">w:r</span> <span class="attr">w:rsidR</span>=<span class="string">&quot;00CD7E74&quot;</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">w:rPr</span>&gt;</span></span><br><span class="line">      <span class="tag">&lt;<span class="name">w:rStyle</span> <span class="attr">w:val</span>=<span class="string">&quot;a3&quot;</span> /&gt;</span></span><br><span class="line">    <span class="tag">&lt;/<span class="name">w:rPr</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">w:commentReference</span> <span class="attr">w:id</span>=<span class="string">&quot;0&quot;</span> /&gt;</span></span><br><span class="line">  <span class="tag">&lt;/<span class="name">w:r</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">w:p</span>&gt;</span></span><br></pre></td></tr></table></figure>

<p>参照上述结构，代码如下：</p>
<figure class="highlight c#"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">using</span> DocumentFormat.OpenXml.Packaging;</span><br><span class="line"><span class="keyword">using</span> DocumentFormat.OpenXml.Wordprocessing;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">AppendComment</span>(<span class="params">WordprocessingDocument doc, Paragraph paragraph, <span class="built_in">string</span> author, <span class="built_in">string</span> content</span>)</span></span><br><span class="line">&#123;</span><br><span class="line">    <span class="built_in">int</span> id = <span class="number">0</span>; <span class="comment">// 新批注Id</span></span><br><span class="line">    WordprocessingCommentsPart part = doc.MainDocumentPart.WordprocessingCommentsPart;</span><br><span class="line">    <span class="keyword">if</span> (part == <span class="literal">null</span>)</span><br><span class="line">    &#123;</span><br><span class="line">        part = doc.MainDocumentPart.AddNewPart&lt;P.WordprocessingCommentsPart&gt;();</span><br><span class="line">        part.Comments = <span class="keyword">new</span> Comments();</span><br><span class="line">    &#125;</span><br><span class="line">    Comments comments = part.Comments;</span><br><span class="line">    <span class="comment">// Id 值为当前批注最大值加1</span></span><br><span class="line">    List&lt;<span class="built_in">int</span>&gt; ids = <span class="keyword">new</span> List&lt;<span class="built_in">int</span>&gt;();</span><br><span class="line">    <span class="keyword">foreach</span> (Comment c <span class="keyword">in</span> comments)</span><br><span class="line">        ids.Add(c.Id.Value.ToInt());</span><br><span class="line">    <span class="keyword">if</span> (ids.Count &gt; <span class="number">0</span>)</span><br><span class="line">    &#123;</span><br><span class="line">        ids.Sort();</span><br><span class="line">        id = ids.Last() + <span class="number">1</span>;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="comment">// 设置批注内容</span></span><br><span class="line">    Paragraph con_para = <span class="keyword">new</span> Paragraph(<span class="keyword">new</span> Run(<span class="keyword">new</span> Text(content)));</span><br><span class="line">    Comment comment = <span class="keyword">new</span> Comment(con_para) &#123; Id = id.ToString(), Author = author &#125;;</span><br><span class="line">    comments.AppendChild(comment);</span><br><span class="line">    <span class="comment">// 插入批注标记</span></span><br><span class="line">    CommentRangeStart start = <span class="keyword">new</span> CommentRangeStart() &#123; Id = id.ToString() &#125;;</span><br><span class="line">    CommentRangeEnd end = <span class="keyword">new</span> CommentRangeEnd() &#123; Id = id.ToString() &#125;;</span><br><span class="line">    Run run = <span class="keyword">new</span> Run(<span class="keyword">new</span> CommentReference() &#123; Id = id.ToString()&#125;);</span><br><span class="line">    paragraph.InsertAt(start, <span class="number">0</span>);</span><br><span class="line">    paragraph.AppendChild(end);</span><br><span class="line">    paragraph.AppendChild(run);</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

    <script type="text/javascript">
  stellar = {
    // 懒加载 css https://github.com/filamentgroup/loadCSS
    loadCSS: (href, before, media, attributes) => {
      var doc = window.document;
      var ss = doc.createElement("link");
      var ref;
      if (before) {
        ref = before;
      } else {
        var refs = (doc.body || doc.getElementsByTagName("head")[0]).childNodes;
        ref = refs[refs.length - 1];
      }
      var sheets = doc.styleSheets;
      if (attributes) {
        for (var attributeName in attributes) {
          if (attributes.hasOwnProperty(attributeName)) {
            ss.setAttribute(attributeName, attributes[attributeName]);
          }
        }
      }
      ss.rel = "stylesheet";
      ss.href = href;
      ss.media = "only x";
      function ready(cb) {
        if (doc.body) {
          return cb();
        }
        setTimeout(function () {
          ready(cb);
        });
      }
      ready(function () {
        ref.parentNode.insertBefore(ss, before ? ref : ref.nextSibling);
      });
      var onloadcssdefined = function (cb) {
        var resolvedHref = ss.href;
        var i = sheets.length;
        while (i--) {
          if (sheets[i].href === resolvedHref) {
            return cb();
          }
        }
        setTimeout(function () {
          onloadcssdefined(cb);
        });
      };
      function loadCB() {
        if (ss.addEventListener) {
          ss.removeEventListener("load", loadCB);
        }
        ss.media = media || "all";
      }
      if (ss.addEventListener) {
        ss.addEventListener("load", loadCB);
      }
      ss.onloadcssdefined = onloadcssdefined;
      onloadcssdefined(loadCB);
      return ss;
    },

    // 从 butterfly 和 volantis 获得灵感
    loadScript: (src, opt) => new Promise((resolve, reject) => {
      var script = document.createElement('script');
      script.src = src;
      if (opt) {
        for (let key of Object.keys(opt)) {
          script[key] = opt[key]
        }
      } else {
        // 默认异步，如果需要同步，第二个参数传入 {} 即可
        script.async = true
      }
      script.onerror = reject
      script.onload = script.onreadystatechange = function() {
        const loadState = this.readyState
        if (loadState && loadState !== 'loaded' && loadState !== 'complete') return
        script.onload = script.onreadystatechange = null
        resolve()
      }
      document.head.appendChild(script)
    }),

    // https://github.com/jerryc127/hexo-theme-butterfly
