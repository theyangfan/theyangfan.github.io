  <h1 class="article-title"><span>表格</span></h1>
  <h2 id="1-添加表格"><a href="#1-添加表格" class="headerlink" title="1. 添加表格"></a>1. 添加表格</h2><p>下面的示例演示如何在文档中添加表格：</p>
<figure class="highlight c#"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">using</span> Berry.Docx;</span><br><span class="line"><span class="keyword">using</span> Berry.Docx.Documents;</span><br><span class="line"></span><br><span class="line"><span class="keyword">using</span> (Document doc = <span class="keyword">new</span> Document(<span class="string">&quot;example.docx&quot;</span>))</span><br><span class="line">&#123;</span><br><span class="line">    Table tbl1 = doc.CreateTable(<span class="number">3</span>, <span class="number">3</span>);<span class="comment">// 3行3列</span></span><br><span class="line"></span><br><span class="line">    tbl1.Rows[<span class="number">0</span>].Cells[<span class="number">1</span>].Paragraphs[<span class="number">0</span>].Text = <span class="string">&quot;第1列&quot;</span>;</span><br><span class="line">    tbl1.Rows[<span class="number">0</span>].Cells[<span class="number">2</span>].Paragraphs[<span class="number">0</span>].Text = <span class="string">&quot;第2列&quot;</span>;</span><br><span class="line">    tbl1.Rows[<span class="number">1</span>].Cells[<span class="number">0</span>].Paragraphs[<span class="number">0</span>].Text = <span class="string">&quot;第1行&quot;</span>;</span><br><span class="line">    tbl1.Rows[<span class="number">2</span>].Cells[<span class="number">0</span>].Paragraphs[<span class="number">0</span>].Text = <span class="string">&quot;第2行&quot;</span>;</span><br><span class="line"></span><br><span class="line">    doc.Sections[<span class="number">0</span>].ChildObjects.Add(tbl1);</span><br><span class="line"></span><br><span class="line">    <span class="comment">// 保存</span></span><br><span class="line">    doc.Save();</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<h2 id="2-插入行和列"><a href="#2-插入行和列" class="headerlink" title="2. 插入行和列"></a>2. 插入行和列</h2><p>下面的示例演示如何在表格单元格四周插入行和列：</p>
<figure class="highlight c#"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">using</span> Berry.Docx;</span><br><span class="line"><span class="keyword">using</span> Berry.Docx.Documents;</span><br><span class="line"></span><br><span class="line"><span class="keyword">using</span> (Document doc = <span class="keyword">new</span> Document(<span class="string">&quot;example.docx&quot;</span>))</span><br><span class="line">&#123;</span><br><span class="line">    Table tbl1 = doc.Sections[<span class="number">0</span>].Tables[<span class="number">0</span>];</span><br><span class="line">    TableCell cell1 = tbl1.Rows[<span class="number">1</span>].Cells[<span class="number">1</span>];</span><br><span class="line">    cell1.InsertRowAbove();</span><br><span class="line">    cell1.InsertRowBelow();</span><br><span class="line">    cell1.InsertColumnLeft();</span><br><span class="line">    cell1.InsertColumnRight();</span><br><span class="line"></span><br><span class="line">    <span class="comment">// 保存</span></span><br><span class="line">    doc.Save();</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

    <script type="text/javascript">
  stellar = {
    // 懒加载 css https://github.com/filamentgroup/loadCSS
    loadCSS: (href, before, media, attributes) => {
      var doc = window.document;
      var ss = doc.createElement("link");
      var ref;
      if (before) {
        ref = before;
      } else {
        var refs = (doc.body || doc.getElementsByTagName("head")[0]).childNodes;
        ref = refs[refs.length - 1];
      }
      var sheets = doc.styleSheets;
      if (attributes) {
        for (var attributeName in attributes) {
          if (attributes.hasOwnProperty(attributeName)) {
            ss.setAttribute(attributeName, attributes[attributeName]);
          }
        }
      }
      ss.rel = "stylesheet";
      ss.href = href;
      ss.media = "only x";
      function ready(cb) {
        if (doc.body) {
          return cb();
        }
        setTimeout(function () {
          ready(cb);
        });
      }
      ready(function () {
        ref.parentNode.insertBefore(ss, before ? ref : ref.nextSibling);
      });
      var onloadcssdefined = function (cb) {
        var resolvedHref = ss.href;
        var i = sheets.length;
        while (i--) {
          if (sheets[i].href === resolvedHref) {
            return cb();
          }
        }
        setTimeout(function () {
          onloadcssdefined(cb);
        });
      };
      function loadCB() {
        if (ss.addEventListener) {
          ss.removeEventListener("load", loadCB);
        }
        ss.media = media || "all";
      }
      if (ss.addEventListener) {
        ss.addEventListener("load", loadCB);
      }
      ss.onloadcssdefined = onloadcssdefined;
      onloadcssdefined(loadCB);
      return ss;
    },

    // 从 butterfly 和 volantis 获得灵感
    loadScript: (src, opt) => new Promise((resolve, reject) => {
      var script = document.createElement('script');
      script.src = src;
      if (opt) {
        for (let key of Object.keys(opt)) {
          script[key] = opt[key]
        }
      } else {
        // 默认异步，如果需要同步，第二个参数传入 {} 即可
        script.async = true
      }
      script.onerror = reject
      script.onload = script.onreadystatechange = function() {
        const loadState = this.readyState
        if (loadState && loadState !== 'loaded' && loadState !== 'complete') return
        script.onload = script.onreadystatechange = null
        resolve()
      }
      document.head.appendChild(script)
    }),

    // https://github.com/jerryc127/hexo-theme-butterfly
    jQuery: (fn) => {
      if (typeof jQuery === 'undefined') {
        stellar.loadScript(stellar.plugins.jQuery).then(fn)
      } else {
        fn()
      }
    }
  };
  stellar.github = 'https://github.com/xaoxuu/hexo-theme-stellar/tree/1.6.1';
  stellar.config = {
    date_suffix: {
      just: '刚刚',
      min: '分钟前',
      hour: '小时前',
      day: '天前',
      month: '个月前',
    },
  };

  // required plugins (only load if needs)
  stellar.plugins = {
    jQuery: 'https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.min.js',
    sitesjs: '/js/plugins/sites.js',
    friendsjs: '/js/plugins/friends.js',
  };

  // optional plugins
  if ('true' == 'true') {
    stellar.plugins.lazyload = Object.assign({"enable":true,"js":"https://cdn.jsdelivr.net/npm/vanilla-lazyload@17.3.1/dist/lazyload.min.js","transition":"blur"});
  }
  if ('true' == 'true') {
    stellar.plugins.swiper = Object.assign({"enable":true,"css":"https://unpkg.com/swiper@6/swiper-bundle.min.css","js":"https://unpkg.com/swiper@6/swiper-bundle.min.js"});
  }
  if ('' == 'true') {
    stellar.plugins.scrollreveal = Object.assign({"enable":null,"js":"https://cdn.jsdelivr.net/npm/scrollreveal@4.0.9/dist/scrollreveal.min.js","distance":"8px","duration":500,"interval":100,"scale":1});
  }
  if ('true' == 'true') {
    stellar.plugins.preload = Object.assign({"enable":true,"service":"flying_pages","instant_page":"https://cdn.jsdelivr.net/gh/volantis-x/cdn-volantis@4.1.2/js/instant_page.js","flying_pages":"https://cdn.jsdelivr.net/gh/gijo-varghese/flying-pages@2.1.2/flying-pages.min.js"});
  }
  if ('true' == 'true') {
    stellar.plugins.fancybox = Object.assign({"enable":true,"js":"https://cdn.jsdelivr.net/npm/@fancyapps/ui@4.0/dist/fancybox.umd.js","css":"https://cdn.jsdelivr.net/npm/@fancyapps/ui@4.0/dist/fancybox.css","selector":".swiper-slide img"});
  }
  if ('false' == 'true') {
    stellar.plugins.heti = Object.assign({"enable":false});
  }
</script>
